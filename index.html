<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booze Wheel</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0c0b09;
  --s1:#131210;
  --s2:#1a1815;
  --line:rgba(255,255,255,0.07);
  --text:#e2d9cc;
  --muted:#7a6f64;
  --dim:#4a4238;
  --acc:#e8512a;
}

html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;font-weight:400;-webkit-font-smoothing:antialiased}

.shell{display:grid;grid-template-columns:1fr 320px;min-height:100vh}

/* ─── LEFT ────────────────────────── */
.left{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:28px;padding:48px 40px;
  border-right:1px solid var(--line);
}

.wordmark{
  font-family:'Anton',sans-serif;font-size:12px;
  letter-spacing:6px;color:var(--muted);
  text-transform:uppercase;align-self:flex-start;
}

/* wheel */
.wheel-zone{position:relative;display:flex;align-items:center;justify-content:center}
canvas#c{display:block;border-radius:50%}

/* pointer – sits on the RIGHT edge, pointing left into the wheel */
.pin{
  position:absolute;right:-2px;top:50%;
  transform:translateY(-50%);
  display:flex;align-items:center;z-index:2;
}
.pin-bar{width:10px;height:3px;background:var(--acc)}
.pin-tri{
  width:0;height:0;
  border-top:12px solid transparent;
  border-bottom:12px solid transparent;
  border-right:28px solid var(--acc);
}

/* result */
.result-strip{
  height:64px;display:flex;align-items:center;
  justify-content:center;text-align:center;
}
#idleMsg{font-size:13px;color:var(--muted);letter-spacing:1px}
#resultName{
  font-family:'Anton',sans-serif;font-size:48px;
  letter-spacing:1px;line-height:1;color:var(--text);
  opacity:0;transform:translateY(6px);
  transition:opacity .3s ease,transform .3s ease;
  display:none;
}
#resultName.show{opacity:1;transform:translateY(0)}

/* button */
.spin-wrap{display:flex;flex-direction:column;align-items:center;gap:10px}
.spin-btn{
  font-family:'Anton',sans-serif;font-size:20px;letter-spacing:4px;
  background:var(--acc);color:#fff;border:none;cursor:pointer;
  padding:14px 56px;
  clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
  transition:background .12s,transform .08s;
  user-select:none;
}
.spin-btn:hover:not(:disabled){background:#f0622f}
.spin-btn:active:not(:disabled){transform:scale(0.97)}
.spin-btn:disabled{background:var(--dim);cursor:not-allowed}
#spinCount{font-size:11px;color:var(--dim);letter-spacing:1.5px}

/* ─── RIGHT ───────────────────────── */
.right{display:flex;flex-direction:column;background:var(--s1)}

.panel-head{
  padding:28px 24px 20px;border-bottom:1px solid var(--line);
}
.panel-head h2{
  font-family:'Anton',sans-serif;font-size:14px;
  letter-spacing:4px;color:var(--muted);font-weight:400;
}

.add-row{
  display:flex;flex-direction:column;gap:7px;
  padding:14px 24px 16px;border-bottom:1px solid var(--line);
}
.add-row input{
  background:var(--s2);border:1px solid var(--line);border-radius:3px;
  padding:9px 12px;color:var(--text);
  font-family:'Outfit',sans-serif;font-size:14px;
  outline:none;transition:border-color .12s;
}
.add-row input::placeholder{color:var(--dim)}
.add-row input:focus{border-color:rgba(232,81,42,0.45)}
.add-row button{
  background:transparent;border:1px solid var(--line);color:var(--muted);
  border-radius:3px;padding:8px 12px;font-family:'Outfit',sans-serif;
  font-size:13px;cursor:pointer;transition:color .12s,border-color .12s;
  text-align:left;
}
.add-row button:hover{color:var(--acc);border-color:rgba(232,81,42,0.3)}

.list{
  flex:1;overflow-y:auto;padding:0;
  scrollbar-width:thin;scrollbar-color:var(--s2) transparent;
}
.item{
  display:flex;align-items:center;gap:10px;
  padding:10px 24px;border-bottom:1px solid var(--line);
  transition:background .1s;
}
.item:hover{background:var(--s2)}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.item-name{
  flex:1;font-size:13px;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;color:var(--text);
}
.rm{
  background:none;border:none;color:var(--dim);
  cursor:pointer;font-size:18px;line-height:1;
  padding:0 2px;transition:color .1s;flex-shrink:0;
}
.rm:hover{color:var(--acc)}
.empty-state{
  padding:40px 24px;color:var(--muted);
  font-size:13px;text-align:center;line-height:1.6;
}

.hist{padding:14px 24px 20px;border-top:1px solid var(--line)}
.hist-label{
  font-size:10px;letter-spacing:2.5px;color:var(--dim);
  text-transform:uppercase;margin-bottom:10px;
}
.hist-list{display:flex;flex-direction:column;gap:5px}
.hrow{
  font-size:13px;color:var(--muted);
  display:flex;align-items:center;gap:8px;
}
.hrow::before{
  content:'';width:3px;height:3px;border-radius:50%;
  background:var(--dim);flex-shrink:0;
}
.hrow.top{color:var(--acc)}
.hrow.top::before{background:var(--acc)}

@media(max-width:740px){
  .shell{grid-template-columns:1fr;min-height:auto}
  .left{padding:32px 20px;border-right:none;border-bottom:1px solid var(--line)}
  canvas#c{width:280px!important;height:280px!important}
  #resultName{font-size:36px}
}
</style>
</head>
<body>
<div class="shell">

  <div class="left">
    <div class="wordmark">Booze Wheel</div>

    <div class="wheel-zone">
      <canvas id="c" width="420" height="420"></canvas>
      <div class="pin"><div class="pin-bar"></div><div class="pin-tri"></div></div>
    </div>

    <div class="result-strip">
      <div id="idleMsg">Give it a spin.</div>
      <div id="resultName"></div>
    </div>

    <div class="spin-wrap">
      <button class="spin-btn" id="spinBtn">SPIN</button>
      <div id="spinCount">0 SPINS</div>
    </div>
  </div>

  <div class="right">
    <div class="panel-head"><h2>YOUR DRINKS</h2></div>

    <div class="add-row">
      <input type="text" id="inp" placeholder="Drink name..." maxlength="36">
      <button id="addBtn">+ Add to wheel</button>
    </div>

    <div class="list" id="list"></div>

    <div class="hist" id="histWrap" style="display:none">
      <div class="hist-label">History</div>
      <div class="hist-list" id="histList"></div>
    </div>
  </div>
</div>

<script>
const PAL = [
  '#c0392b','#d68910','#1a7a4a','#2471a3',
  '#7d3c98','#ca6f1e','#1abc9c','#922b21',
  '#1f618d','#b7950b','#117a65','#6c3483',
  '#e67e22','#2e86c1','#8e44ad','#28b463',
];

let drinks = [
  'Modelo Watermelon','Modelo Pineapple',
  'Four Loko Jungle Juice','Bud Light',
  'White Claw Mango','Corona Extra',
];
let spins   = 0;
let history = [];
let angle   = 0;
let spinning = false;

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const CX = canvas.width / 2, CY = canvas.height / 2, R = CX - 6;
const TAU = Math.PI * 2;

// ── Draw ─────────────────────────────────
function draw(a) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const n = drinks.length;
  if (!n) {
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    ctx.beginPath(); ctx.arc(CX,CY,R,0,TAU); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.18)';
    ctx.font='400 14px Outfit'; ctx.textAlign='center';
    ctx.fillText('Add drinks to get started', CX, CY+5);
    return;
  }
  const slice = TAU / n;
  for (let i = 0; i < n; i++) {
    const s = a + i * slice, e = s + slice;
    ctx.beginPath(); ctx.moveTo(CX,CY); ctx.arc(CX,CY,R,s,e); ctx.closePath();
    ctx.fillStyle = PAL[i % PAL.length]; ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 1.5; ctx.stroke();

    const mid = s + slice * 0.5;
    const tx  = CX + Math.cos(mid) * R * 0.62;
    const ty  = CY + Math.sin(mid) * R * 0.62;
    const fs  = Math.max(10, Math.min(15, 14.5 - Math.max(0, n-6) * 0.45));
    const maxW = slice < 0.55 ? 68 : slice < 1.1 ? 108 : 148;

    ctx.save();
    ctx.translate(tx, ty);
    ctx.rotate(mid + Math.PI / 2);
    ctx.textAlign = 'center';
    ctx.font = `600 ${fs}px Outfit`;

    let lbl = drinks[i];
    while (ctx.measureText(lbl).width > maxW && lbl.length > 2) lbl = lbl.slice(0,-1);
    if (lbl !== drinks[i]) lbl = lbl.slice(0,-1) + '…';

    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillText(lbl, 1, fs*0.36+1);
    ctx.fillStyle = '#fff';
    ctx.fillText(lbl, 0, fs*0.36);
    ctx.restore();
  }
  // hub
  ctx.beginPath(); ctx.arc(CX,CY,22,0,TAU);
  ctx.fillStyle='#0c0b09'; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.beginPath(); ctx.arc(CX,CY,7,0,TAU);
  ctx.fillStyle='#e8512a'; ctx.fill();
}

// ── Winner ───────────────────────────────
// Pointer is at canvas angle 0 (3 o'clock, right side).
// Segment i covers [angle + i*slice, angle + (i+1)*slice].
// Find i where pointer (0) falls:
//   offset = (-angle mod TAU + TAU) mod TAU
//   idx    = floor(offset / slice)
function winner() {
  const n = drinks.length;
  const slice = TAU / n;
  const offset = ((-angle % TAU) + TAU) % TAU;
  return Math.floor(offset / slice) % n;
}

// ── Spin ─────────────────────────────────
function spin() {
  if (spinning || drinks.length < 2) return;
  spinning = true;
  document.getElementById('spinBtn').disabled = true;

  const rName = document.getElementById('resultName');
  rName.classList.remove('show');

  const delta   = (5 + Math.random() * 5) * TAU + Math.random() * TAU;
  const dur     = 3600 + Math.random() * 1400;
  const start   = angle;
  let   t0      = null;

  function easeOut(t) { return 1 - (1-t)*(1-t)*(1-t); }

  requestAnimationFrame(function frame(ts) {
    if (!t0) t0 = ts;
    const p = Math.min((ts - t0) / dur, 1);
    angle = start + delta * easeOut(p);
    draw(angle);
    if (p < 1) { requestAnimationFrame(frame); return; }
    angle = ((angle % TAU) + TAU) % TAU;
    draw(angle);
    spinning = false;
    document.getElementById('spinBtn').disabled = false;
    done();
  });
}

function done() {
  const idx  = winner();
  const name = drinks[idx];

  spins++;
  document.getElementById('spinCount').textContent =
    `${spins} SPIN${spins===1?'':'S'}`;

  document.getElementById('idleMsg').style.display = 'none';
  const rName = document.getElementById('resultName');
  rName.style.display = 'block';
  rName.textContent = name;
  requestAnimationFrame(() => requestAnimationFrame(() => rName.classList.add('show')));

  history.unshift(name);
  if (history.length > 5) history.pop();
  renderHistory();
}

// ── List ─────────────────────────────────
function renderList() {
  const el = document.getElementById('list');
  if (!drinks.length) {
    el.innerHTML = '<div class="empty-state">No drinks yet.<br>Add something above.</div>';
    draw(angle); return;
  }
  el.innerHTML = drinks.map((d,i) =>
    `<div class="item">
       <span class="dot" style="background:${PAL[i%PAL.length]}"></span>
       <span class="item-name" title="${esc(d)}">${esc(d)}</span>
       <button class="rm" data-i="${i}">×</button>
     </div>`
  ).join('');
  el.querySelectorAll('.rm').forEach(b => b.addEventListener('click', () => {
    drinks.splice(+b.dataset.i, 1);
    renderList();
  }));
  draw(angle);
}

function addDrink() {
  const inp = document.getElementById('inp');
  const v = inp.value.trim();
  if (!v) return;
  drinks.push(v);
  inp.value = '';
  renderList();
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ── History ───────────────────────────────
function renderHistory() {
  const wrap = document.getElementById('histWrap');
  const list = document.getElementById('histList');
  if (!history.length) { wrap.style.display='none'; return; }
  wrap.style.display = 'block';
  list.innerHTML = history.map((h,i) =>
    `<div class="hrow${i===0?' top':''}">${esc(h)}</div>`
  ).join('');
}

// ── Events ────────────────────────────────
document.getElementById('spinBtn').addEventListener('click', spin);
document.getElementById('addBtn').addEventListener('click', addDrink);
document.getElementById('inp').addEventListener('keydown', e => { if(e.key==='Enter') addDrink(); });

// ── Boot ──────────────────────────────────
renderList();
</script>
</body>
</html>
