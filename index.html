<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Booze Wheel</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080b12;
    --surface: #0f1420;
    --surface2: #161d2e;
    --border: rgba(255,255,255,0.07);
    --accent: #e63946;
    --accent2: #f4a261;
    --text: #f0f0f0;
    --muted: rgba(240,240,240,0.45);
    --glow: 0 0 30px rgba(230,57,70,0.3);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
  }

  body {
    min-height: 100vh;
    background:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(230,57,70,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(244,162,97,0.06) 0%, transparent 50%),
      #080b12;
  }

  /* ── Layout ── */
  .app {
    display: grid;
    grid-template-columns: 1fr 360px;
    grid-template-rows: auto 1fr;
    min-height: 100vh;
    gap: 0;
  }

  /* ── Header ── */
  header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    background: rgba(8,11,18,0.9);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 3px;
    background: linear-gradient(135deg, #e63946, #f4a261);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tagline {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* ── Wheel Section ── */
  .wheel-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    position: relative;
  }

  .wheel-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Outer glow ring */
  .wheel-wrap::before {
    content: '';
    position: absolute;
    inset: -16px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, #e63946, #f4a261, #2ec4b6, #9b5de5, #e63946);
    opacity: 0.18;
    filter: blur(8px);
    animation: ring-pulse 3s ease-in-out infinite alternate;
  }

  @keyframes ring-pulse {
    from { opacity: 0.12; transform: scale(0.97); }
    to   { opacity: 0.22; transform: scale(1.01); }
  }

  canvas#wheel {
    border-radius: 50%;
    display: block;
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 0 40px rgba(230,57,70,0.25));
  }

  /* Pointer */
  .pointer {
    position: absolute;
    right: -24px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 5;
    width: 0;
    height: 0;
    border-top: 18px solid transparent;
    border-bottom: 18px solid transparent;
    border-right: 42px solid #e63946;
    filter: drop-shadow(0 0 10px rgba(230,57,70,0.8));
  }

  .pointer::after {
    content: '';
    position: absolute;
    top: 50%;
    right: -44px;
    transform: translateY(-50%);
    width: 14px;
    height: 14px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 14px rgba(230,57,70,1);
  }

  /* Spin button */
  .spin-btn {
    margin-top: 36px;
    padding: 16px 60px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 4px;
    background: linear-gradient(135deg, #e63946, #c0392b);
    color: #fff;
    border: none;
    border-radius: 60px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 24px rgba(230,57,70,0.4), 0 0 0 1px rgba(230,57,70,0.3);
    user-select: none;
  }

  .spin-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 36px rgba(230,57,70,0.55), 0 0 0 1px rgba(230,57,70,0.5);
  }

  .spin-btn:active:not(:disabled) { transform: translateY(0) scale(0.97); }

  .spin-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* ── Sidebar ── */
  .sidebar {
    border-left: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 28px 28px 20px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--accent2);
    margin-bottom: 4px;
  }

  .sidebar-sub {
    font-size: 12px;
    color: var(--muted);
  }

  /* Add drink form */
  .add-form {
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .add-form input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  .add-form input::placeholder { color: var(--muted); }

  .add-form input:focus {
    border-color: rgba(230,57,70,0.5);
    box-shadow: 0 0 0 3px rgba(230,57,70,0.1);
  }

  .add-btn {
    background: var(--surface2);
    border: 1px solid rgba(230,57,70,0.3);
    color: var(--accent);
    border-radius: 8px;
    padding: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }

  .add-btn:hover {
    background: rgba(230,57,70,0.1);
    border-color: var(--accent);
  }

  /* Drink list */
  .drink-list {
    flex: 1;
    overflow-y: auto;
    padding: 16px 28px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.1) transparent;
  }

  .drink-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    transition: border-color 0.2s, transform 0.15s;
    animation: slide-in 0.25s ease;
  }

  @keyframes slide-in {
    from { opacity: 0; transform: translateX(20px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .drink-item:hover {
    border-color: rgba(255,255,255,0.15);
    transform: translateX(-2px);
  }

  .drink-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .drink-name {
    flex: 1;
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .drink-remove {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color 0.15s, background 0.15s;
  }

  .drink-remove:hover {
    color: var(--accent);
    background: rgba(230,57,70,0.12);
  }

  /* ── Result Overlay ── */
  #result-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(8,11,18,0.88);
    backdrop-filter: blur(10px);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 24px;
  }

  #result-overlay.show { display: flex; }

  .result-card {
    background: var(--surface);
    border: 1px solid rgba(230,57,70,0.3);
    border-radius: 24px;
    padding: 50px 60px;
    text-align: center;
    box-shadow: 0 0 80px rgba(230,57,70,0.2), 0 40px 80px rgba(0,0,0,0.5);
    animation: pop-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    max-width: 480px;
    width: 90%;
  }

  @keyframes pop-in {
    from { transform: scale(0.6); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  .result-emoji { font-size: 60px; margin-bottom: 16px; }

  .result-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 4px;
    color: var(--muted);
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  .result-drink {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    letter-spacing: 2px;
    background: linear-gradient(135deg, #e63946, #f4a261);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
    margin-bottom: 8px;
  }

  .result-sub {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 32px;
  }

  .result-btns {
    display: flex;
    gap: 12px;
    justify-content: center;
  }

  .btn-again {
    padding: 12px 32px;
    background: linear-gradient(135deg, #e63946, #c0392b);
    color: #fff;
    border: none;
    border-radius: 50px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(230,57,70,0.4);
  }

  .btn-again:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(230,57,70,0.55); }

  .btn-close {
    padding: 12px 28px;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }

  .btn-close:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

  /* Confetti canvas */
  #confetti-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 101;
  }

  /* ── History ── */
  .history-wrap {
    padding: 16px 28px 24px;
    border-top: 1px solid var(--border);
  }

  .history-title {
    font-size: 11px;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .history-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .history-chip {
    font-size: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    color: var(--muted);
    max-width: 140px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .history-chip:first-child {
    border-color: rgba(230,57,70,0.4);
    color: var(--accent);
    background: rgba(230,57,70,0.08);
  }

  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; grid-template-rows: auto auto 1fr; }
    header { padding: 16px 20px; }
    .wheel-section { padding: 30px 20px; }
    .sidebar { border-left: none; border-top: 1px solid var(--border); }
    canvas#wheel { width: 280px !important; height: 280px !important; }
  }
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="app">
  <header>
    <div class="logo">🍺 THE BOOZE WHEEL</div>
    <div class="tagline">SPIN. DRINK. REPEAT.</div>
  </header>

  <section class="wheel-section">
    <div class="wheel-wrap">
      <canvas id="wheel" width="460" height="460"></canvas>
      <div class="pointer"></div>
    </div>
    <button class="spin-btn" id="spinBtn">SPIN IT</button>
  </section>

  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Your Drinks</div>
      <div class="sidebar-sub">Add, remove, and customize your wheel</div>
    </div>

    <div class="add-form">
      <input type="text" id="drinkInput" placeholder="Add a drink... (e.g. Modelo Watermelon)" maxlength="40">
      <button class="add-btn" id="addBtn">+ Add to Wheel</button>
    </div>

    <div class="drink-list" id="drinkList"></div>

    <div class="history-wrap">
      <div class="history-title">Last Spins</div>
      <div class="history-chips" id="historyChips">
        <span class="history-chip" style="opacity:0.4">No spins yet</span>
      </div>
    </div>
  </aside>
</div>

<!-- Result Overlay -->
<div id="result-overlay">
  <div class="result-card">
    <div class="result-emoji" id="resultEmoji">🍺</div>
    <div class="result-label">Tonight you're drinking</div>
    <div class="result-drink" id="resultDrink">Modelo Watermelon</div>
    <div class="result-sub" id="resultSub">Bottoms up! No complaints.</div>
    <div class="result-btns">
      <button class="btn-again" id="btnAgain">SPIN AGAIN</button>
      <button class="btn-close" id="btnClose">Close</button>
    </div>
  </div>
</div>

<script>
const COLORS = [
  '#e63946','#f4a261','#2ec4b6','#9b5de5',
  '#06d6a0','#ef476f','#ffd166','#118ab2',
  '#fb5607','#8338ec','#3a86ff','#ff006e',
  '#52b788','#e9c46a','#264653','#e76f51'
];

const EMOJIS = ['🍺','🍻','🥂','🍷','🍸','🍹','🥃','🍾'];

const drinkSubs = [
  "No complaints allowed.",
  "The wheel has spoken.",
  "Down it!",
  "Cheers! 🥂",
  "Destiny has been decided.",
  "You asked for it.",
  "Bottoms up!",
  "No backing out now.",
];

let drinks = [
  "Modelo Watermelon",
  "Modelo Pineapple",
  "Four Loko Jungle Juice",
  "Bud Light",
  "White Claw Mango",
  "Corona Extra",
];

let history = [];
let spinning = false;
let currentAngle = 0;

const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const spinBtn = document.getElementById('spinBtn');
const drinkInput = document.getElementById('drinkInput');
const addBtn = document.getElementById('addBtn');
const drinkList = document.getElementById('drinkList');
const overlay = document.getElementById('result-overlay');
const resultDrink = document.getElementById('resultDrink');
const resultEmoji = document.getElementById('resultEmoji');
const resultSub = document.getElementById('resultSub');
const historyChips = document.getElementById('historyChips');
const confettiCanvas = document.getElementById('confetti-canvas');
const confettiCtx = confettiCanvas.getContext('2d');

// ── Draw Wheel ──
function drawWheel(angle) {
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2;
  const r = W / 2 - 8;
  const n = drinks.length;

  ctx.clearRect(0, 0, W, H);

  if (n === 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '500 18px DM Sans';
    ctx.textAlign = 'center';
    ctx.fillText('Add drinks to spin!', cx, cy);
    return;
  }

  const slice = (Math.PI * 2) / n;

  for (let i = 0; i < n; i++) {
    const start = angle + i * slice;
    const end = start + slice;
    const color = COLORS[i % COLORS.length];

    // Segment
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
    ctx.strokeStyle = 'rgba(8,11,18,0.8)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Label
    const mid = start + slice / 2;
    const labelR = r * 0.65;
    const tx = cx + Math.cos(mid) * labelR;
    const ty = cy + Math.sin(mid) * labelR;

    ctx.save();
    ctx.translate(tx, ty);
    ctx.rotate(mid + Math.PI / 2);

    const maxW = slice < 0.6 ? 80 : (slice < 1.2 ? 120 : 160);
    const name = drinks[i];
    const fontSize = Math.max(11, Math.min(16, 240 / n));

    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.font = `600 ${fontSize}px DM Sans`;
    ctx.textAlign = 'center';

    // Truncate if needed
    let displayName = name;
    ctx.font = `600 ${fontSize}px DM Sans`;
    while (ctx.measureText(displayName).width > maxW && displayName.length > 3) {
      displayName = displayName.slice(0, -1);
    }
    if (displayName !== name) displayName = displayName.slice(0,-1) + '…';

    // Shadow
    ctx.shadowColor = 'rgba(0,0,0,0.4)';
    ctx.shadowBlur = 4;

    ctx.fillStyle = '#fff';
    ctx.fillText(displayName, 0, fontSize / 3);
    ctx.restore();
  }

  // Center cap
  ctx.beginPath();
  ctx.arc(cx, cy, 30, 0, Math.PI * 2);
  ctx.fillStyle = '#0f1420';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Center dot
  ctx.beginPath();
  ctx.arc(cx, cy, 10, 0, Math.PI * 2);
  ctx.fillStyle = '#e63946';
  ctx.fill();
}

// ── Spin Logic ──
function spin() {
  if (spinning || drinks.length < 2) return;
  spinning = true;
  spinBtn.disabled = true;

  const extraSpins = 5 + Math.random() * 5;
  const targetAngle = currentAngle + extraSpins * Math.PI * 2 + Math.random() * Math.PI * 2;
  const duration = 4000 + Math.random() * 1500;
  const start = performance.now();
  const startAngle = currentAngle;

  function easeOut(t) {
    return 1 - Math.pow(1 - t, 4);
  }

  function tick(now) {
    const elapsed = now - start;
    const t = Math.min(elapsed / duration, 1);
    currentAngle = startAngle + (targetAngle - startAngle) * easeOut(t);
    drawWheel(currentAngle);

    if (t < 1) {
      requestAnimationFrame(tick);
    } else {
      currentAngle = currentAngle % (Math.PI * 2);
      spinning = false;
      spinBtn.disabled = false;
      showResult();
    }
  }

  requestAnimationFrame(tick);
}

// ── Result ──
function showResult() {
  const n = drinks.length;
  const slice = (Math.PI * 2) / n;
  // Pointer is at 3 o'clock (angle 0 in canvas = right), but we want top
  // Normalize: the pointer points left (PI), find which segment is at angle PI
  const pointerAngle = Math.PI; // pointing left
  const normalized = ((pointerAngle - currentAngle) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
  const idx = Math.floor(normalized / slice) % n;
  const drink = drinks[idx];

  resultDrink.textContent = drink;
  resultEmoji.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
  resultSub.textContent = drinkSubs[Math.floor(Math.random() * drinkSubs.length)];

  overlay.classList.add('show');
  launchConfetti();
  addHistory(drink);
}

// ── History ──
function addHistory(drink) {
  history.unshift(drink);
  if (history.length > 8) history.pop();
  renderHistory();
}

function renderHistory() {
  if (history.length === 0) {
    historyChips.innerHTML = '<span class="history-chip" style="opacity:0.4">No spins yet</span>';
    return;
  }
  historyChips.innerHTML = history.map((d, i) =>
    `<span class="history-chip" title="${d}">${d}</span>`
  ).join('');
}

// ── Drink List ──
function renderList() {
  drinkList.innerHTML = '';
  drinks.forEach((d, i) => {
    const item = document.createElement('div');
    item.className = 'drink-item';
    const color = COLORS[i % COLORS.length];
    item.innerHTML = `
      <span class="drink-dot" style="background:${color}"></span>
      <span class="drink-name">${escHtml(d)}</span>
      <button class="drink-remove" data-i="${i}" title="Remove">×</button>
    `;
    drinkList.appendChild(item);
  });
  drinkList.querySelectorAll('.drink-remove').forEach(btn => {
    btn.addEventListener('click', () => {
      drinks.splice(+btn.dataset.i, 1);
      renderList();
      drawWheel(currentAngle);
    });
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function addDrink() {
  const val = drinkInput.value.trim();
  if (!val) return;
  drinks.push(val);
  drinkInput.value = '';
  renderList();
  drawWheel(currentAngle);
}

// ── Confetti ──
let confettiParticles = [];

function launchConfetti() {
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
  confettiParticles = Array.from({length: 120}, () => ({
    x: Math.random() * window.innerWidth,
    y: -20,
    r: 4 + Math.random() * 8,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    vx: (Math.random() - 0.5) * 6,
    vy: 3 + Math.random() * 5,
    rot: Math.random() * 360,
    rotV: (Math.random() - 0.5) * 10,
    alpha: 1,
    shape: Math.random() > 0.5 ? 'rect' : 'circle'
  }));
  animateConfetti();
}

function animateConfetti() {
  confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  confettiParticles = confettiParticles.filter(p => p.alpha > 0.01);
  if (!confettiParticles.length) return;

  confettiParticles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.12;
    p.rot += p.rotV;
    if (p.y > window.innerHeight * 0.6) p.alpha -= 0.03;

    confettiCtx.save();
    confettiCtx.globalAlpha = p.alpha;
    confettiCtx.fillStyle = p.color;
    confettiCtx.translate(p.x, p.y);
    confettiCtx.rotate(p.rot * Math.PI / 180);
    if (p.shape === 'rect') {
      confettiCtx.fillRect(-p.r, -p.r/2, p.r*2, p.r);
    } else {
      confettiCtx.beginPath();
      confettiCtx.arc(0, 0, p.r, 0, Math.PI * 2);
      confettiCtx.fill();
    }
    confettiCtx.restore();
  });

  requestAnimationFrame(animateConfetti);
}

// ── Events ──
spinBtn.addEventListener('click', spin);
addBtn.addEventListener('click', addDrink);
drinkInput.addEventListener('keydown', e => { if (e.key === 'Enter') addDrink(); });

document.getElementById('btnClose').addEventListener('click', () => {
  overlay.classList.remove('show');
});

document.getElementById('btnAgain').addEventListener('click', () => {
  overlay.classList.remove('show');
  setTimeout(spin, 200);
});

overlay.addEventListener('click', e => {
  if (e.target === overlay) overlay.classList.remove('show');
});

window.addEventListener('resize', () => {
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
});

// ── Init ──
renderList();
drawWheel(currentAngle);
</script>
</body>
